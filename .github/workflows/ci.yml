name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            playwright-tests/package-lock.json

      - name: Install Angular app dependencies
        run: |
          cd app
          npm ci

      - name: Build Angular app (verify build works)
        run: |
          cd app
          npm run build

      - name: Install Playwright dependencies
        run: |
          cd playwright-tests
          npm ci

      - name: Install Playwright browsers
        run: |
          cd playwright-tests
          npx playwright install --with-deps chromium

      # Note: Playwright's webServer config automatically starts the Angular app
      # (npm start) on port 4200 and waits for it to be ready before running tests
      - name: Run Playwright tests
        run: |
          cd playwright-tests
          npm test
        env:
          CI: true

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-tests/playwright-report/
          retention-days: 30

      - name: Upload Playwright test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: playwright-tests/test-results/
          retention-days: 30
